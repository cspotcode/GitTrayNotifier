name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: dotnet publish GitTrayNotifier/GitTrayNotifier.csproj -c Release -o publish

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/GitTrayNotifier.exe
          generate_release_notes: true
